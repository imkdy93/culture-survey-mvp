<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>조직문화 진단 설문 MVP</title>

  <link rel="stylesheet" href="/style.css?v=20260625-01" />

  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="page-wrap">
    <header class="survey-header">
      <div class="logo-box" id="logoBox">
        ORG
      </div>

      <div>
        <p class="client-name" id="clientName">설문을 불러우는 중입니다</p>
        <h1 id="surveyTitle">2026 조직문화 진단</h1>
        <p class="survey-desc" id="surveyDescription">
          잠시만 기다려 주세요...
        </p>
      </div>
    </header>

    <main class="survey-card">
      <section id="tokenSection">
        <h2>설문 접속 확인</h2>
        <p class="help-text">
          안내받은 설문 링크로 접속해 주세요.
        </p>

        <div class="input-row">
          <input
            type="text"
            id="tokenInput"
            placeholder="응답자 토큰 입력"
          />
          <button id="loadSurveyBtn">설문 시작</button>
        </div>

        <p id="tokenMessage" class="message"></p>
      </section>

      <section id="surveySection" class="hidden">
        <div class="respondent-box">
          <p>
            <strong>응답자 코드:</strong>
            <span id="respondentKey"></span>
          </p>
          <p>
            <strong>소속:</strong>
            <span id="respondentOrg"></span>
          </p>
        </div>

        <div id="draftMessage" class="message"></div>

        <form id="surveyForm">
          <div id="questionContainer"></div>

          <div class="submit-area">
            <button type="button" id="saveAndExitBtn" class="secondary-btn">
              임시저장 후 종료
            </button>

            <button type="submit" id="submitBtn">
              응답 제출
            </button>
          </div>
        </form>

        <p id="submitMessage" class="message"></p>
      </section>

      <section id="alreadySubmittedSection" class="hidden">
          <div class="complete-card">
            <h2>이미 제출이 완료된 설문입니다.</h2>

            <p>
              이 설문은 이미 제출이 완료되어 다시 응답할 수 없습니다.
            </p>

            <div class="submitted-info-box">
              <p>
                <strong>응답자 코드:</strong>
                <span id="alreadySubmittedRespondentKey">-</span>
              </p>
              <p>
                <strong>소속:</strong>
                <span id="alreadySubmittedOrg">-</span>
              </p>
              <p>
                <strong>제출일시:</strong>
                <span id="alreadySubmittedAt">-</span>
              </p>
            </div>
              <p class="help-text">
                응답 수정 또는 재참여가 필요한 경우 설문 운영 담당자에게 문의해 주세요.
              </p>
            </div>
      </section>

      <section id="completeSection" class="hidden">
        <h2>응답이 제출되었습니다.</h2>
        <p>
          참여해 주셔서 감사합니다.
        </p>
      </section>
    </main>
  </div>

  <script src="/app.js?v=20260625-01"></script>
</body>
</html>
